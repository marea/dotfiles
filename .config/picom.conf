#################################
#          Animations           #
#################################
transition-length = 200
transition-pow-x = 0.50
transition-pow-y = 0.50
transition-pow-w = 0.50
transition-pow-h = 0.50
size-transition = true


#################################
#             Corners           #
#################################
corner-radius = 0.0;
rounded-corners-exclude = [
	"name = 'xmobar'",
	"class_g = 'dmenu'",
	"class_g = 'Polybar'",
	"window_type = 'tooltip'"
];
round-borders = 1;
round-borders-exclude = [ ];

#################################
#             Shadows           #
#################################
#shadow = true;
#shadow-radius = 7;
#shadow-opacity = 0.4
#shadow-offset-x = 0;
#shadow-offset-y = 0;
#shadow-exclude = [];


#################################
#           Fading              #
#################################
fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4
fade-exclude = []


#################################
#   Transparency / Opacity      #
#################################
inactive-opacity = 0.1;
frame-opacity = 1.0;
popup_menu = { opacity = 1.0; }
dropdown_menu = { opacity = 1.0; }
inactive-opacity-override = true
active-opacity = 1.0;
inactive-dim = 0.5
focus-exclude = [];
inactive-dim-fixed = 1.0
opacity-rule = [];


#################################
#     Background-Blurring       #
#################################
blur: {
  method = "kawase";
  strength = 5;
  background = false;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
}
blur-background-exclude = [];


#################################
#       General Settings        #
#################################
experimental-backends = true;
backend = "glx";
vsync = true
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = true;
refresh-rate = 0
detect-transient = true
detect-client-leader = true
invert-color-include = []
use-damage = false
log-level = "info";
wintypes:
{
  normal = { fade = true; shadow = false; }
  tooltip = { fade = false; shadow = false; opacity = 0.80; focus = true; full-shadow = false; };
  dock = { shadow = false; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 0.8; shadow = false}
  dropdown_menu = { opacity = 0.8; shadow = false}
};
