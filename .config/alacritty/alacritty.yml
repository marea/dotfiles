window:
  padding:
    x: 10
    y: 10

font:
  normal:
    family: GoMono Nerd Font Mono
    style: Regular
  bold:
    family: GoMono Nerd Font Mono
    style: Bold
  italic:
    family: GoMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: GoMono Nerd Font Mono
    style: Bold Italic
  size: 8.0

background_opacity: 0.8

bell:
  animation: EaseOut
  duration: 200
  color: "0xbebebe"

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

# Start flavours
# Base16 Generated - alacritty color config
# Flavours
colors:
  # Default colors
  primary:
    background: '0x1b282d'
    foreground: '0xd3c9c0'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x1b282d'
    cursor: '0xd3c9c0'

  # Normal colors
  normal:
    black:   '0x1b282d'
    red:     '0x8b7b7b'
    green:   '0x627d83'
    yellow:  '0x707982'
    blue:    '0x677c7c'
    magenta: '0x6a7b86'
    cyan:    '0x687c7d'
    white:   '0xd3c9c0'

  # Bright colors
  bright:
    black:   '0x8a8986'
    red:     '0x6c7a87'
    green:   '0x40484b'
    yellow:  '0x656868'
    blue:    '0xaea9a3'
    magenta: '0xd9d1ca'
    cyan:    '0x8c837b'
    white:   '0xe0d9d3'

draw_bold_text_with_bright_colors: false
# End flavours
