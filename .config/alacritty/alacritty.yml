window:
  padding:
    x: 10
    y: 10

font:
  normal:
    family: GoMono Nerd Font Mono
    style: Regular
  bold:
    family: GoMono Nerd Font Mono
    style: Bold
  italic:
    family: GoMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: GoMono Nerd Font Mono
    style: Bold Italic
  size: 8.0

background_opacity: 0.8

bell:
  animation: EaseOut
  duration: 200
  color: "0xbebebe"

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

# Start flavours
# Base16 Generated - alacritty color config
# Flavours
colors:
  # Default colors
  primary:
    background: '0x382119'
    foreground: '0xc7bcae'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x382119'
    cursor: '0xc7bcae'

  # Normal colors
  normal:
    black:   '0x382119'
    red:     '0xd64627'
    green:   '0xb49303'
    yellow:  '0xad680b'
    blue:    '0xae6641'
    magenta: '0xba6011'
    cyan:    '0xc28623'
    white:   '0xc7bcae'

  # Bright colors
  bright:
    black:   '0x8e7e72'
    red:     '0xa46c2c'
    green:   '0x554037'
    yellow:  '0x715f55'
    blue:    '0xab9d90'
    magenta: '0xcfc6ba'
    cyan:    '0xc35914'
    white:   '0xd8d0c6'

draw_bold_text_with_bright_colors: false
# End flavours
