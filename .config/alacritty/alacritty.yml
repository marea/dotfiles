window:
  padding:
    x: 10
    y: 10

font:
  normal:
    family: GoMono Nerd Font Mono
    style: Regular
  bold:
    family: GoMono Nerd Font Mono
    style: Bold
  italic:
    family: GoMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: GoMono Nerd Font Mono
    style: Bold Italic
  size: 8.0

background_opacity: 0.8

bell:
  animation: EaseOut
  duration: 200
  color: "0xbebebe"

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

# Start flavours
# Base16 Generated - alacritty color config
# Flavours
colors:
  # Default colors
  primary:
    background: '0x3d221c'
    foreground: '0xd9d2ca'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x3d221c'
    cursor: '0xd9d2ca'

  # Normal colors
  normal:
    black:   '0x3d221c'
    red:     '0x956d83'
    green:   '0x89818c'
    yellow:  '0x787878'
    blue:    '0xbb5d46'
    magenta: '0x8b9296'
    cyan:    '0x907168'
    white:   '0xd9d2ca'

  # Bright colors
  bright:
    black:   '0x9b8b84'
    red:     '0x906f7d'
    green:   '0x5c453f'
    yellow:  '0x7c6862'
    blue:    '0xbaafa7'
    magenta: '0xdfd8d2'
    cyan:    '0x847572'
    white:   '0xe4dfda'

draw_bold_text_with_bright_colors: false
# End flavours
