window:
  padding:
    x: 10
    y: 10

font:
  normal:
    family: GoMono Nerd Font Mono
    style: Regular
  bold:
    family: GoMono Nerd Font Mono
    style: Bold
  italic:
    family: GoMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: GoMono Nerd Font Mono
    style: Bold Italic
  size: 8.0

background_opacity: 0.8

bell:
  animation: EaseOut
  duration: 200
  color: "0xbebebe"

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

# Start flavours
# Base16 Generated - alacritty color config
# Flavours
colors:
  # Default colors
  primary:
    background: '0x262626'
    foreground: '0xcbcbcb'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x262626'
    cursor: '0xcbcbcb'

  # Normal colors
  normal:
    black:   '0x262626'
    red:     '0x976e6e'
    green:   '0xa162a1'
    yellow:  '0x9c6e4f'
    blue:    '0x787878'
    magenta: '0x787878'
    cyan:    '0x787878'
    white:   '0xcbcbcb'

  # Bright colors
  bright:
    black:   '0x898989'
    red:     '0x4e854e'
    green:   '0x474747'
    yellow:  '0x686868'
    blue:    '0xaaaaaa'
    magenta: '0xd3d3d3'
    cyan:    '0x787878'
    white:   '0xdadada'

draw_bold_text_with_bright_colors: false
# End flavours
