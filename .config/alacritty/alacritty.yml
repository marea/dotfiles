window:
  padding:
    x: 10
    y: 10

font:
  normal:
    family: GoMono Nerd Font Mono
    style: Regular
  bold:
    family: GoMono Nerd Font Mono
    style: Bold
  italic:
    family: GoMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: GoMono Nerd Font Mono
    style: Bold Italic
  size: 8.0

background_opacity: 0.8

bell:
  animation: EaseOut
  duration: 200
  color: "0xbebebe"

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

# Start flavours
# Base16 Generated - alacritty color config
# Flavours
colors:
  # Default colors
  primary:
    background: "0x452121"
    foreground: "0xe9e2e0"

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: "0x452121"
    cursor: "0xe9e2e0"

  # Normal colors
  normal:
    black: "0x452121"
    red: "0x84728b"
    green: "0xa86573"
    yellow: "0x867753"
    blue: "0x797b4d"
    magenta: "0x787878"
    cyan: "0xb47a83"
    white: "0xe9e2e0"

  # Bright colors
  bright:
    black: "0xa79594"
    red: "0xb3624a"
    green: "0x664747"
    yellow: "0x876e6d"
    blue: "0xc8bbba"
    magenta: "0xece6e5"
    cyan: "0x81785b"
    white: "0xefeae9"

draw_bold_text_with_bright_colors: false
# End flavours
