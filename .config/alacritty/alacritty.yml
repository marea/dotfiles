window:
  padding:
    x: 10
    y: 10

font:
  normal:
    family: GoMono Nerd Font Mono
    style: Regular
  bold:
    family: GoMono Nerd Font Mono
    style: Bold
  italic:
    family: GoMono Nerd Font Mono
    style: Italic
  bold_italic:
    family: GoMono Nerd Font Mono
    style: Bold Italic
  size: 8.0

background_opacity: 0.5

bell:
  animation: EaseOut
  duration: 200
  color: "0xbebebe"

key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }

# Start flavours
# Base16 Generated - alacritty color config
# Flavours
colors:
  # Default colors
  primary:
    background: '0x1a2439'
    foreground: '0xd1d7de'

  # Colors the cursor will use if `custom_cursor_colors` is true
  cursor:
    text: '0x1a2439'
    cursor: '0xd1d7de'

  # Normal colors
  normal:
    black:   '0x1a2439'
    red:     '0x787878'
    green:   '0x5d83c4'
    yellow:  '0x447cae'
    blue:    '0x6377af'
    magenta: '0x4d8bbc'
    cyan:    '0x5676c2'
    white:   '0xd1d7de'

  # Bright colors
  bright:
    black:   '0x88909c'
    red:     '0x5d7aa0'
    green:   '0x3e485a'
    yellow:  '0x636c7b'
    blue:    '0xacb3bd'
    magenta: '0xd8dde3'
    cyan:    '0x6e7892'
    white:   '0xdee3e8'

draw_bold_text_with_bright_colors: false
# End flavours
