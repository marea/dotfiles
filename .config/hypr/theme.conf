general {
    gaps_in = 5
    gaps_out = 0,10,10,10
    border_size = 2
# Start flavours
    col.active_border = rgba(b9adb0ee) rgba(927e83ee) 45deg
    col.inactive_border = rgba(6b4f55aa)
# End flavours
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 4
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 0.5
    fullscreen_opacity = 1.0

    shadow {
        enabled = true
        range = 0
        render_power = 3
        sharp = true
        offset = 4, 4
        color = rgba(000000ee)
    }

    blur {
        enabled = true
        size = 10
        passes = 2
        vibrancy = 0.1696
    }
}
